<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Il Nostro Menu</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #FAF9F6; color: #800000; font-family: serif; }
        .granata-text { color: #800000; }
        .oro-text { color: #B8860B; }
    </style>
</head>
<body class="p-6">
    <div class="max-w-md mx-auto">
        <h1 class="text-4xl font-bold text-center mb-10 border-b-2 border-red-900 pb-4">Menu</h1>
        <div id="menu-container" class="space-y-8"></div>
    </div>

    <script>
        fetch('menu-cibo.json')
            .then(response => response.json())
            .then(data => {
                const container = document.getElementById('menu-container');
                data.menu.forEach(cat => {
                    let html = `<h2 class="text-2xl font-bold uppercase tracking-widest mb-4 border-b border-red-900/30">${cat.categoria}</h2>`;
                    cat.piatti.forEach(p => {
                        html += `
                            <div class="mb-4">
                                <div class="flex justify-between items-baseline">
                                    <h3 class="font-bold text-lg">${p.nome}</h3>
                                    <span class="oro-text font-bold">${p.prezzo}</span>
                                </div>
                                <p class="text-sm text-stone-600 italic">${p.descrizione}</p>
                                <p class="text-[10px] text-stone-400 mt-1">Allergeni: ${p.allergeni}</p>
                            </div>
                        `;
                    });
                    container.innerHTML += `<div class="mb-8">${html}</div>`;
                });
            });
    </script>
</body>
</html>
