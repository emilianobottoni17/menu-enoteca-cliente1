<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Menu Digitale</title>
</head>
<body class="bg-stone-900 text-stone-100 p-6">
    <div class="max-w-md mx-auto">
        <h1 class="text-3xl font-serif mb-6 text-center text-amber-500">Il Nostro Menu</h1>
        <div id="menu-container" class="space-y-6">
            </div>
    </div>

    <script>
        fetch('menu-cibo.json')
            .then(response => response.json())
            .then(data => {
                const container = document.getElementById('menu-container');
                data.piatti.forEach(piatto => {
                    container.innerHTML += `
                        <div class="border-b border-stone-700 pb-4">
                            <div class="flex justify-between items-baseline">
                                <h2 class="text-lg font-bold">${piatto.nome}</h2>
                                <span class="text-amber-400 font-semibold">${piatto.prezzo}€</span>
                            </div>
                            <p class="text-sm text-stone-400 mt-1">${piatto.descrizione}</p>
                            <small class="text-stone-600 block mt-1 italic">${piatto.allergeni}</small>
                        </div>
                    `;
                });
            });
    </script>
</body>
</html>
